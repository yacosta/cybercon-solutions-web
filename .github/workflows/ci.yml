name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & validate Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro + Pagefind)
        run: npm run build

      # Bundles the Worker from the Astro build output without contacting
      # Cloudflare, so this validates the deploy config with no credentials.
      - name: Validate Cloudflare Worker bundle
        run: npx wrangler deploy --dry-run
