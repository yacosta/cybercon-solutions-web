name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro + Pagefind)
        run: npm run build

      # Uses the project-pinned wrangler (package.json) so the deploy matches
      # `npm run deploy` locally. Runtime env vars/secrets are configured in the
      # Cloudflare dashboard (Workers -> Settings -> Variables and Secrets).
      # --keep-vars preserves dashboard plaintext vars (secrets already persist).
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
